<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <title>نظام إدارة الامتحانات المتقدم</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/student.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/advanced-upgrade.css">
</head>
<body>

    <!-- ═══════════════════════════════════════
         NOTIFICATIONS
    ═══════════════════════════════════════ -->
    <div id="notification-container" role="region" aria-label="الإشعارات" aria-live="polite"></div>

    <!-- ═══════════════════════════════════════
         LOGIN SCREEN
    ═══════════════════════════════════════ -->
    <div id="login-screen" class="screen active" role="main">
        <div class="login-wrapper">
            <div class="login-card">

                <div class="login-header">
                    <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                    <h1>نظام الامتحانات</h1>
                    <p>منصة إدارة الاختبارات المتقدمة</p>
                </div>

                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="username-input">
                            <i class="fas fa-user" aria-hidden="true"></i>
                            اسم المستخدم
                        </label>
                        <input
                            type="text"
                            id="username-input"
                            name="username"
                            placeholder="أدخل اسم المستخدم"
                            autocomplete="username"
                            required
                            autofocus
                        >
                    </div>

                    <div class="form-group">
                        <label for="password-input">
                            <i class="fas fa-lock" aria-hidden="true"></i>
                            كلمة المرور
                        </label>
                        <input
                            type="password"
                            id="password-input"
                            name="password"
                            placeholder="أدخل كلمة المرور"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-arrow-right-to-bracket" aria-hidden="true"></i>
                        <span>تسجيل الدخول</span>
                        <i class="fas fa-spinner fa-spin" style="display:none;" aria-hidden="true"></i>
                    </button>
                </form>

                <div class="login-footer">
                    <i class="fas fa-shield-halved" aria-hidden="true"></i>
                    نظام آمن ومشفر
                </div>

            </div>
        </div>
    </div>


    <!-- ═══════════════════════════════════════
         ADMIN SCREEN
    ═══════════════════════════════════════ -->
    <div id="admin-screen" class="screen" role="main">

        <!-- Mobile Topbar -->
        <div class="mobile-topbar" role="banner">
            <button class="menu-toggle" id="menu-toggle-btn" aria-label="فتح القائمة" aria-expanded="false" aria-controls="admin-sidebar">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <span class="mobile-topbar-logo">
                <i class="fas fa-graduation-cap"></i>
            </span>
            <span class="mobile-topbar-title">لوحة التحكم</span>
        </div>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay" role="presentation" aria-hidden="true"></div>

        <div class="admin-wrapper">

            <!-- ── Sidebar ── -->
            <nav class="admin-sidebar" id="admin-sidebar" role="navigation" aria-label="القائمة الرئيسية">

                <div class="sidebar-header">
                    <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                    <h2>لوحة التحكم</h2>
                </div>

                <ul class="sidebar-menu" role="menubar">
                    <li class="active"
                        data-section="dashboard"
                        role="menuitem"
                        tabindex="0"
                        aria-current="page"
                        aria-label="لوحة المعلومات">
                        <i class="fas fa-chart-line" aria-hidden="true"></i>
                        <span>لوحة المعلومات</span>
                    </li>
                    <li data-section="exams"
                        role="menuitem"
                        tabindex="0"
                        aria-label="الامتحانات">
                        <i class="fas fa-file-alt" aria-hidden="true"></i>
                        <span>الامتحانات</span>
                    </li>
                    <li data-section="students"
                        role="menuitem"
                        tabindex="0"
                        aria-label="الطلاب">
                        <i class="fas fa-users" aria-hidden="true"></i>
                        <span>الطلاب</span>
                    </li>
                    <li data-section="monitoring"
                        role="menuitem"
                        tabindex="0"
                        aria-label="المراقبة">
                        <i class="fas fa-eye" aria-hidden="true"></i>
                        <span>المراقبة</span>
                    </li>
                    <li data-section="grades"
                        role="menuitem"
                        tabindex="0"
                        aria-label="العلامات">
                        <i class="fas fa-chart-bar" aria-hidden="true"></i>
                        <span>العلامات</span>
                    </li>
                    <li data-section="analytics"
                        role="menuitem"
                        tabindex="0"
                        aria-label="التحليلات">
                        <i class="fas fa-chart-pie" aria-hidden="true"></i>
                        <span>التحليلات</span>
                    </li>
                </ul>

                <div class="sidebar-footer">
                    <button id="logout-btn" class="btn btn-danger-outlined" aria-label="تسجيل الخروج">
                        <i class="fas fa-arrow-right-from-bracket" aria-hidden="true"></i>
                        <span>تسجيل الخروج</span>
                    </button>
                </div>

            </nav>

            <!-- ── Main Content ── -->
            <main class="admin-main" id="admin-main" role="main" aria-label="المحتوى الرئيسي">

                <!-- Dashboard -->
                <section
                    id="dashboard-section"
                    class="admin-section active"
                    role="region"
                    aria-label="لوحة المعلومات">
                    <h2>
                        <i class="fas fa-chart-line" aria-hidden="true"></i>
                        لوحة المعلومات
                    </h2>
                    <div id="dashboard-content"></div>
                </section>

                <!-- Exams -->
                <section
                    id="exams-section"
                    class="admin-section"
                    role="region"
                    aria-label="الامتحانات">
                    <div class="section-header">
                        <h2>
                            <i class="fas fa-file-alt" aria-hidden="true"></i>
                            الامتحانات
                        </h2>
                        <button id="new-exam-btn" class="btn btn-success" aria-label="إنشاء امتحان جديد">
                            <i class="fas fa-plus" aria-hidden="true"></i>
                            <span>امتحان جديد</span>
                        </button>
                    </div>
                    <div id="exams-content"></div>
                </section>

                <!-- Students -->
                <section
                    id="students-section"
                    class="admin-section"
                    role="region"
                    aria-label="الطلاب">
                    <div class="section-header">
                        <h2>
                            <i class="fas fa-users" aria-hidden="true"></i>
                            الطلاب
                        </h2>
                        <button id="new-student-btn" class="btn btn-success" aria-label="إضافة طالب جديد">
                            <i class="fas fa-user-plus" aria-hidden="true"></i>
                            <span>طالب جديد</span>
                        </button>
                    </div>
                    <div id="students-content"></div>
                </section>

                <!-- Monitoring -->
                <section
                    id="monitoring-section"
                    class="admin-section"
                    role="region"
                    aria-label="المراقبة المباشرة">
                    <h2>
                        <i class="fas fa-eye" aria-hidden="true"></i>
                        المراقبة المباشرة
                    </h2>
                    <div id="monitoring-content"></div>
                </section>

                <!-- Grades -->
                <section
                    id="grades-section"
                    class="admin-section"
                    role="region"
                    aria-label="العلامات والتصحيح">
                    <h2>
                        <i class="fas fa-chart-bar" aria-hidden="true"></i>
                        العلامات والتصحيح
                    </h2>
                    <div id="grades-content"></div>
                </section>

                <!-- Analytics -->
                <section
                    id="analytics-section"
                    class="admin-section"
                    role="region"
                    aria-label="التحليلات والإحصائيات">
                    <h2>
                        <i class="fas fa-chart-pie" aria-hidden="true"></i>
                        التحليلات والإحصائيات
                    </h2>
                    <div id="analytics-content"></div>
                </section>

            </main>
        </div>
    </div>


    <!-- ═══════════════════════════════════════
         STUDENT SCREEN
    ═══════════════════════════════════════ -->
    <div id="student-screen" class="screen" role="main">

        <!-- Student Header -->
        <header class="student-header" role="banner">
            <h2>
                <i class="fas fa-hand-wave" aria-hidden="true"></i>
                مرحباً،&nbsp;<span id="student-name"></span>
            </h2>
            <button
                id="student-logout-btn"
                class="btn btn-danger-outlined btn-sm"
                aria-label="تسجيل الخروج">
                <i class="fas fa-arrow-right-from-bracket" aria-hidden="true"></i>
                <span>خروج</span>
            </button>
        </header>

        <!-- Student Main -->
        <main class="student-main" role="main">

            <!-- Student Dashboard -->
            <section
                id="student-dashboard"
                class="student-section active"
                role="region"
                aria-label="لوحة الطالب">
                <div id="student-dashboard-content"></div>
            </section>

            <!-- Exam Taker -->
            <section
                id="exam-taker"
                class="student-section"
                role="region"
                aria-label="الامتحان الحالي">
                <div id="exam-content"></div>
            </section>

        </main>
    </div>


    <!-- ═══════════════════════════════════════
         MODAL SYSTEM
    ═══════════════════════════════════════ -->
    <div
        id="modal-overlay"
        class="modal-overlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        aria-hidden="true">
        <div id="modal-content" class="modal-box" tabindex="-1"></div>
    </div>


    <!-- ═══════════════════════════════════════
         SCRIPTS
    ═══════════════════════════════════════ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/app.js"></script>

</body>
</html>
